<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OCTcases</title>

    <base href="/" />

    <meta name="description" content="OCTcases is a high-yield, free resource created for medical students, optometry students, residents, and eye care professionals to hone their skills in interpreting optical coherence tomography (OCT) scans.">
    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <script>
      (function () {
        var themeKey = 'octcases-theme';
        var legacyThemeKey = 'darkMode';
        var storedTheme = localStorage.getItem(themeKey);
        if (storedTheme !== 'light' && storedTheme !== 'dark') {
          var legacyTheme = localStorage.getItem(legacyThemeKey);
          storedTheme = legacyTheme === 'on' ? 'dark' : legacyTheme === 'off' ? 'light' : null;
        }

        var resolvedTheme = storedTheme;
        if (resolvedTheme !== 'light' && resolvedTheme !== 'dark') {
          resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        var useDesktopUi =
          window.matchMedia('(min-width: 1100px)').matches &&
          (window.matchMedia('(hover: hover)').matches ||
            window.matchMedia('(pointer: fine)').matches);

        document.documentElement.dataset.theme = resolvedTheme;
        document.documentElement.dataset.ui = useDesktopUi ? 'desktop' : 'mobile';
        document.documentElement.classList.toggle('dark', resolvedTheme === 'dark');
        document.documentElement.style.colorScheme = resolvedTheme;
        window.__OCTCASES_THEME__ = resolvedTheme;
        window.__OCTCASES_UI__ = useDesktopUi ? 'desktop' : 'mobile';
      })();
    </script>
  </head>

  <body>
    <div id="app"></div>
    <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "c5a1010008b947829f6a32bd08d8a7c4"}'></script><!-- End Cloudflare Web Analytics -->
  </body>

</html>
